<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Shield | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(13, 17, 23, 0.8);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
            margin-top: 0.5rem;
            padding: 0.9rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
            <span class="logo-icon">🛡️</span>
            <h1>Scam Shield</h1>
        </a>
        <nav>
            <a href="index.html" class="nav-link">Home</a>
            <a href="features.html" class="nav-link">Features</a>
            <a href="api.html" class="nav-link">API</a>
            <a href="signin.html" class="btn btn-outline">Sign In</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="glass-card auth-card">
                <div class="auth-header">
                    <h2>Create an Account</h2>
                    <p>Join Scam Shield to scan URLs with no limits.</p>
                </div>
                
                <form class="auth-form" action="index.html">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Sign Up</span>
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="signin.html">Sign In</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Automatically log them in since they just signed up
            localStorage.setItem('isSignedIn', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
